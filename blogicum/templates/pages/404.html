{% extends "base.html" %}
{% block title %}Страница не найдена{% endblock %}
{% block content %}
<div class="col d-flex justify-content-center">
    <div class="card" style="width: 40rem;">
        <div class="card-header">Ошибка 404</div>
        <div class="card-body">
            <h1>Страница не найдена</h1>
            <p>Страницы с адресом {{ request.build_absolute_uri }} не существует!</p>
            <a href="{% url 'blog:index' %}" class="btn btn-primary">Вернуться на главную</a>
        </div>
    </div>
</div>
{% endblock %}
